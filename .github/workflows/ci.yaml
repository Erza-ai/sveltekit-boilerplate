name: CI

on:
  push:
    branches: [dev, main, staging]
  pull_request:
    branches: [dev, main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Runs on ubuntu-latest first; if that attempt fails (e.g. a hosted-runner outage), the
# same verification re-runs on a self-hosted runner. The primary job uses continue-on-error
# and exposes a `passed` output so a green fallback still lets CI pass.
jobs:
  primary:
    name: ubuntu-latest
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      passed: ${{ steps.verify.outputs.passed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify
        id: verify
        uses: ./.github/actions/ci-verify

  fallback:
    name: self-hosted fallback
    needs: [primary]
    if: ${{ always() && needs.primary.outputs.passed != 'true' }}
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify
        uses: ./.github/actions/ci-verify
