name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

# Builds on the native hosted runners first (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm);
# if that attempt fails, the same release body re-runs entirely on self-hosted runners.
jobs:
  primary:
    name: hosted runners
    uses: ./.github/workflows/_release.yaml
    with:
      amd_runner: ubuntu-latest
      arm_runner: ubuntu-24.04-arm
    secrets: inherit

  fallback:
    name: self-hosted fallback
    needs: [primary]
    if: ${{ always() && needs.primary.result == 'failure' }}
    uses: ./.github/workflows/_release.yaml
    with:
      amd_runner: self-hosted
      arm_runner: self-hosted
    secrets: inherit
